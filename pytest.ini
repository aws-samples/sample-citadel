[pytest]
# --import-mode=importlib (pytest 6+) avoids sys.path manipulation when
# collecting tests. This is required because multiple arbiter modules
# share basenames (index.py in 6 places, test_index_properties.py in
# 4 places) and the default `prepend` mode causes import-file-mismatch
# errors during combined-suite runs.
# See: https://docs.pytest.org/en/stable/explanation/goodpractices.html#tests-outside-application-code
#
# Note: pytest 9 exposes this as a CLI flag only (no ini key), so we inject
# it via addopts so every invocation inherits it automatically.
addopts = --import-mode=importlib

# Pin rootdir to the repo root so all arbiter/ and backend/ test discovery
# anchors consistently.
testpaths = arbiter

# Tests live under __tests__/ (not tests/) by project convention.
python_files = test_*.py
