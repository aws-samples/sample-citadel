[pytest]
# --import-mode=importlib (pytest 6+) avoids sys.path manipulation when
# collecting tests. This is required because multiple arbiter modules
# share basenames (index.py in 6 places, test_index_properties.py in
# 4 places) and the default `prepend` mode causes import-file-mismatch
# errors during combined-suite runs.
# See: https://docs.pytest.org/en/stable/explanation/goodpractices.html#tests-outside-application-code
#
# Note: pytest 9 exposes this as a CLI flag only (no ini key), so we inject
# it via addopts so every invocation inherits it automatically.
addopts = --import-mode=importlib

# Pin rootdir to the repo root so all arbiter/ and backend/ test discovery
# anchors consistently.
#
# NOTE: backend/src/lambda/cognito-secret-handler/__tests__/test_index.py and
# backend/src/lambda/seed-admin-user/__tests__/test_seed_admin_user_properties.py
# are intentionally NOT added here. Both lambdas ship a same-named index.py
# and their test files inject/pop sys.modules["index"] around each test but
# not at collection time, so running them in the same pytest process as each
# other (or as anything else that imports a same-named "index" module)
# corrupts sys.modules for whichever file runs second — same class of
# collision arbiter/conftest.py works around for the arbiter/ tree, not yet
# extended to backend/. Until that extension lands, CI runs each of these two
# files as its own separate `python3 -m pytest <file>` process (see
# .github/workflows/ci.yml backend-test job) so they never share a session.
testpaths = arbiter

# Tests live under __tests__/ (not tests/) by project convention.
python_files = test_*.py
