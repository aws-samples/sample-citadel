  updateApp(input: UpdateAppInput!): RegistryAgentRecord
  deleteApp(appId: ID!): DeleteAppResult
  bindWorkflowToApp(appId: ID!, workflowId: ID!): RegistryAgentRecord
  unbindWorkflowFromApp(appId: ID!, workflowId: ID!): RegistryAgentRecord
