type Mutation {
  createProject(input: CreateProjectInput!): Project
  updateProject(id: ID!, input: UpdateProjectInput!): Project
  # ADR governance mutations. adds reopenADR with
  # audit-before-auth (QT2A-7 + QT3-3): every reopen attempt is durably
  # audited in citadel-adr-reopen-attempts-{env} BEFORE the Cognito
  # permission check, so denied attempts remain non-repudiable.
  createADR(input: ADRInput!): ADR!
  supersedeADR(oldAdrId: ID!, newAdrId: ID!): ADR!
  reopenADR(adrId: ID!, proposedChange: String!, revisitConditionMatched: Boolean!, reason: String!): ADR!
  sendMessageToAgent(
    projectId: ID!
    agentId: String!
    message: String!
  ): ConversationMessage
  uploadDocument(projectId: ID!, file: S3Object!): DocumentUploadResult
  updateAgentStatus(
    projectId: ID!
    agentId: String!
    status: AgentStatusInput!
  ): AgentStatus
  updateProjectProgress(
    projectId: ID!
    progress: ProjectProgressInput!
  ): ProjectProgress
  sendMessage(
    projectId: ID!
    message: ConversationMessageInput!
  ): ConversationMessage
  publishConversationMessage(input: PublishMessageInput!): ConversationMessage
    @aws_iam
  generateDocumentUploadUrl(input: GenerateUploadUrlInput!): DocumentUploadUrl
  ingestDocument(projectId: ID!, documentKey: String!): IngestDocumentResult
  notifyDocumentReady(projectId: ID!, documentKey: String!, fileName: String!, fileSize: Int!, fileType: String!): NotifyDocumentReadyResult
  deleteDocument(projectId: ID!, documentKey: String!): DocumentDeleteResult
  generateDocumentPdf(projectId: ID!, documentKey: String!): ReportDownloadUrl
  updateAgentConfig(input: UpdateAgentConfigInput!): AgentConfig
  createAgentConfig(input: CreateAgentConfigInput!): AgentConfig
  deleteAgentConfig(agentId: String!): DeleteAgentConfigResult
  updateAgentCode(input: UpdateAgentCodeInput!): AgentCode
  updateToolConfig(input: UpdateToolConfigInput!): ToolConfig
  createToolConfig(input: CreateToolConfigInput!): ToolConfig
  deleteToolConfig(toolId: String!): DeleteToolConfigResult
  requestAgentCreation(input: CreateAgentRequestInput!): AgentCreationResponse
  requestToolCreation(input: CreateToolRequestInput!): AgentCreationResponse
  submitTask(input: SubmitTaskInput!): TaskSubmissionResponse
  adminCreateUser(input: AdminCreateUserInput!): UserManagementResponse
  assignUserRole(input: AssignUserRoleInput!): UserManagementResponse
  removeUserRole(userId: String!, role: String!): UserManagementResponse
  changePassword(input: ChangePasswordInput!): UserManagementResponse
  adminResetUserPassword(userId: String!): UserManagementResponse
  adminResendInvitation(userId: String!): UserManagementResponse
  createOrganization(input: CreateOrganizationInput!): Organization
  deleteOrganization(orgId: String!): UserManagementResponse
  publishAssessmentCompletion(input: AssessmentCompletionInput!): AssessmentCompletionEvent @aws_iam
  publishDesignProgress(input: DesignProgressInput!): DesignProgressEvent @aws_iam @aws_cognito_user_pools
  publishChatter(input: AgentChatterInput!): AgentChatterMessage @aws_iam
  createIntegration(input: CreateIntegrationInput!): Integration
  updateIntegration(input: UpdateIntegrationInput!): Integration
  deleteIntegration(integrationId: ID!): DeleteIntegrationResult
  testIntegration(integrationId: ID!): IntegrationTestResult
  connectIntegration(integrationId: ID!): Integration
  disconnectIntegration(integrationId: ID!): Integration
  publishFabricationEvent(input: FabricationEventInput!): FabricationEvent @aws_iam
  createDataStore(input: CreateDataStoreInput!): DataStore
  updateDataStore(input: UpdateDataStoreInput!): DataStore
  deleteDataStore(dataStoreId: ID!): DeleteDataStoreResult
  connectDataStore(dataStoreId: ID!): DataStore
  disconnectDataStore(dataStoreId: ID!): DataStore
  testDataStoreConnection(dataStoreId: ID!): DataStoreTestResult
  testTool(toolId: String!, inputs: AWSJSON!, orgId: String!): ToolTestResult!
  addAppComponent(appId: ID!, component: RegistryAgentComponentInput!): RegistryAgentRecord
  removeAppComponent(appId: ID!, componentType: String!, componentId: String!): RegistryAgentRecord
  updateAgentBinding(input: UpdateRegistryAgentBindingInput!): RegistryAgentRecord
  setAppConfigSchema(appId: ID!, schema: AWSJSON!, version: Int!): RegistryAgentRecord
  setAppConfigValues(appId: ID!, values: AWSJSON!, version: Int!): RegistryAgentRecord
  publishAppStatusEvent(input: AppStatusEventInput!): AppStatusEvent @aws_iam
  publishAgentManifest(agentId: String!, manifest: AWSJSON!): AgentConfig
  createWorkflow(input: CreateWorkflowInput!): Workflow
  updateWorkflow(input: UpdateWorkflowInput!): Workflow
  deleteWorkflow(workflowId: ID!): DeleteWorkflowResult
  publishWorkflow(workflowId: ID!): Workflow
  updateWorkflowConfiguration(workflowId: ID!, configuration: AWSJSON!, version: Int!): Workflow
  importBlueprint(blueprintId: ID!, appId: ID!, name: String): Workflow
