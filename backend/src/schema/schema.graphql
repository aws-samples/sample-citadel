# Governance UI — Wave 3.C (live tail subscription)
#
# Real-time AppSync subscription. The fanout Lambda observes the governance
# ledger DynamoDB stream (path A — see governance-finding-fanout.ts header
# block) and signs an IAM-authed `publishGovernanceFinding` mutation; the
# subscription fan-outs the projected payload to admin user-pool clients.
#
# Auth model:
#   * `publishGovernanceFinding` is `@aws_iam` ONLY — no user-pool clients
#     can call it. The governance-ui-resolver also performs a defence-in-
#     depth check that the AppSyncIdentity is IAM-shaped (no Cognito sub).
#   * `onGovernanceFinding` is `@aws_cognito_user_pools(cognito_groups: ["admin"])`
#     so AppSync rejects CONNECT for non-admin tokens at the directive
#     layer. The `admin` Cognito group is provisioned by BackendStack
#     (see lib/backend-stack.ts AdminGroup CfnUserPoolGroup). When that
#     group is absent, AppSync falls through to `Forbidden` rather than
#     leaking findings.

input PublishGovernanceFindingInput {
  findingId: String!
  workflowId: String!
  decision: String!
  reason: String!
  requestingAgent: String!
  targetAgent: String!
  scopeEvaluated: String
  contractEvaluated: String
  escalationTarget: String
  residualAuthorityDenial: Boolean
  timestamp: Float!
}

# Governance UI — governance.* EventBridge relay (P8 [HIGH]).
#
# The governance-notifier Lambda receives every governance.* EventBridge
# event, signs a `publishGovernanceEvent` mutation with SigV4, and the
# `@aws_subscribe`-driven onGovernanceEvent subscription fan-outs to
# admin user-pool clients. Mirrors the publishGovernanceFinding /
# onGovernanceFinding pattern but is generalised across the 14
# governance.* detail-types declared in
# backend/src/utils/notifier-base.ts.
#
# Auth model — `publishGovernanceEvent` is `@aws_iam` only (relay
# Lambda) and `onGovernanceEvent` is admin-only Cognito.
# `GovernanceEvent` carries `@aws_iam @aws_cognito_user_pools` so both
# the IAM-authed Lambda and admin user-pool subscribers can produce /
# consume the type.
#
# `version` is bumped manually when the payload contract changes so
# downstream subscribers can branch on it rather than guessing from
# shape.

type GovernanceEvent @aws_iam @aws_cognito_user_pools {
  detailType: String!
  source: String!
  eventTime: AWSDateTime!
  detail: AWSJSON!
  version: Int!
}

input GovernanceEventInput {
  detailType: String!
  source: String!
  eventTime: AWSDateTime!
  detail: AWSJSON!
  version: Int!
}

# Governance UI — Wave 4.A (authority graph)
#
# Read-only projections of the per-app authority topology stored in the
# governance DynamoDB tables. Both queries are admin-only — the resolver
# rejects non-admin callers at the dispatch layer.
#
# `AuthorityScope` mirrors the four-tuple from arbiter/governance/models.py
# (decision_type, domain, conditions, limits). `conditions` and `limits`
# are JSON-encoded maps so the GraphQL transport stays simple; the
# frontend parses them on render. `specificity` is computed server-side
# from the parsed conditions + limits key counts.
#
# Constitutional layer + case-law projections are deferred to Wave 4.C/4.D.

type AuthorityScope {
  decisionType: String!
  domain: String!
  conditions: String!
  limits: String!
  specificity: Int!
}

