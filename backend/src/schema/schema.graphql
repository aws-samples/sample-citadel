# Governance UI — Wave 4.B (blast-radius)
#
# Approximation of the revocation blast radius for a given authority unit
# computed from the recent ledger window. A "true" blast radius would
# require re-running the engine against pending traffic; instead we
# surface the count + workflows + agent pairs of permit findings where
# `scopeEvaluated == unitId` over the requested time window. See
# `.kiro/specs/governance-ui/waves-2-5-roadmap.md` §4.2.
#
# Admin-only — the resolver rejects non-admin callers at the dispatch
# layer. Window defaults to the last 1h, capped at 24h.

type RevokeImpactWorkflow {
  workflowId: String!
  permitCount: Int!
  lastTimestamp: Float!
}

type RevokeImpactAgentPair {
  requestingAgent: String!
  targetAgent: String!
  permitCount: Int!
}

type RevokeImpactReport {
  unitId: String!
  sinceTs: Float!
  untilTs: Float!
  totalPermits: Int!
  distinctWorkflows: Int!
  distinctAgentPairs: Int!
  workflows: [RevokeImpactWorkflow!]!
  agentPairs: [RevokeImpactAgentPair!]!
  truncated: Boolean!
}
# Governance UI — Wave 4.C (constitutional rule tree)
#
# Read-only projection of the per-app constitutional layers table.
# Both queries are admin-only — the resolver rejects non-admin callers
# at the dispatch layer.
#
# `ConstitutionalRule` mirrors the rule dict shape from
# arbiter/governance/engine.py:_constitutional_review. The six supported
# operators (eq, neq, exists, not_exists, gt, lt) are the source of
# truth; any other operator value renders as a degraded badge in the UI
# (matching the engine's "Unknown operator" fallback).
#
# `value` is JSON-encoded for transport (frontend parses on render).
# When the operator is `exists` or `not_exists`, `value` is null.
#
# Rule editing (create/update/revoke) is deferred to Wave 4.C.2.

type ConstitutionalRule {
  field: String!
  operator: String!
  value: String
}

type ConstitutionalLayer {
  layerId: String!
  layerType: String!
  appliesTo: [String!]!
  rules: [ConstitutionalRule!]!
  parentLayerId: String
}

type ConstitutionalRuleOverrideStat {
  layerId: String!
  field: String!
  count7d: Int!
  lastFiredAt: Float
  firstFiredAt: Float
  topAffectedAgents: [String!]!
}

type ConstitutionRuleStatsReport {
  generatedAt: Float!
  sinceTs: Float!
  untilTs: Float!
  totalOverrides: Int!
  stats: [ConstitutionalRuleOverrideStat!]!
  truncated: Boolean!
}
# Governance UI — Wave 4.D (case-law timeline)
#
# Read-only projection of the case-law DynamoDB table. Each entry encodes a
# resolution from a prior human-adjudicated escalation; the engine consults
# them in precedence order (highest first) before falling back to the
# composition / authority-unit pipeline. See
# arbiter/governance/case_law_admin.py for the row schema written to DDB
# and arbiter/governance/hierarchy.py for the engine-side loader.
#
# Admin-only — the resolver rejects non-admin callers at the dispatch
# layer. Encode/revoke admin actions ship in Wave 4.D.2; this wave is
# read-only.
#
# `pattern` and `scopeOfApplicability` are JSON-encoded maps for transport
# (frontend parses on render). `encodedAt` is normalised to an ISO-8601
# string at the resolver — legacy float (epoch seconds) rows are coerced
# via `new Date(value * 1000).toISOString()`.

type CaseLawEntry {
  caseId: String!
  pattern: String!
  resolution: String!
  encodedAt: String!
  encodedBy: String!
  scopeOfApplicability: String!
  precedence: Int!
  revoked: Boolean!
}
# Governance UI — Wave 4.C.2 (constitutional rule editor)
#
# Three admin-only mutations layered on top of the existing read-only
# constitutional projections (Wave 4.C). Each mutation requires an
# acknowledgement string that matches the resolver's
# CONSTITUTIONAL_RULE_ACKNOWLEDGEMENT_TEXT constant verbatim — drift
# between this contract and the resolver is a bug enforced by the
# `contract-constitutional-ack-text.test.ts` drift test.
#
# `ConstitutionalOperator` mirrors the 6 operators in
# arbiter/governance/engine.py:_constitutional_review (eq, neq, exists,
# not_exists, gt, lt). Adding a new operator here without first adding
# its branch in the engine is a contract bug.
#
# The mutation result returns the freshly-projected layer so the page
# can splice it into its local cache without an extra round-trip.
# `emittedEventDetailType` is null when the audit-event emission failed
# (matches the Wave 2.E setGovernanceMode best-effort semantics).

enum ConstitutionalOperator {
  eq
  neq
  exists
  not_exists
  gt
  lt
}

input ConstitutionalRuleInput {
  field: String!
  operator: ConstitutionalOperator!
  value: String
}

input AddConstitutionalRuleInput {
  layerId: String!
  rule: ConstitutionalRuleInput!
  acknowledgement: String!
}

input UpdateConstitutionalRuleInput {
  layerId: String!
  ruleIndex: Int!
  newRule: ConstitutionalRuleInput!
  acknowledgement: String!
}

input DeleteConstitutionalRuleInput {
  layerId: String!
  ruleIndex: Int!
  acknowledgement: String!
}

type ConstitutionalRuleMutationResult {
  ok: Boolean!
  layerId: String!
  action: String!
  layer: ConstitutionalLayer!
  emittedEventDetailType: String
}
# Governance UI — Wave 4.D.2 (case-law admin actions)
#
# Three admin-only mutations layered on top of the read-only case-law
# timeline (Wave 4.D). Each requires an acknowledgement string that
# matches the resolver's CASELAW_ACKNOWLEDGEMENT_TEXT constant verbatim
# — drift between this contract and the resolver is a bug enforced by
# the `contract-caselaw-ack-text.test.ts` drift test.
#
# Soft-delete via `revoked: true` mirrors `case_law_admin.py` semantics
# (see arbiter/governance/hierarchy.py — revoked rows are filtered at
# engine load time). Encoding new rows is intentionally NOT exposed via
# the UI: the encoding flow remains the offline `case_law_admin.py` CLI
# so an operator runbook drives every new precedent.
#
# `revoke` and `unrevoke` are idempotent — calling revoke on an already-
# revoked row no-ops with `emittedEventDetailType: null`. Same shape
# applies to unrevoke. `update-precedence` is also a no-op when the
# supplied `newPrecedence` matches the existing value.
#
# `newPrecedence` MUST be a finite integer in the range [-1000, 1000].
# Out-of-range values throw at the resolver before any DDB write.

input RevokeCaseLawInput {
  caseId: String!
  acknowledgement: String!
  reason: String
}

input UnrevokeCaseLawInput {
  caseId: String!
  acknowledgement: String!
  reason: String
}

input UpdateCaseLawPrecedenceInput {
  caseId: String!
  newPrecedence: Int!
  acknowledgement: String!
  reason: String
}

type CaseLawMutationResult {
  ok: Boolean!
  caseId: String!
  action: String!
  entry: CaseLawEntry!
  emittedEventDetailType: String
}
# Governance UI — Wave 4.E.A (authority graph history config)
#
# Configurable daily-snapshot infrastructure backing the Wave 4.E.B time
# scrubber. Default OFF — operators consciously opt in to enable
# snapshots and pay the storage cost. The scheduled Lambda
# `governance-graph-snapshot` reads the SSM-backed settings JSON and
# either skips early (`enabled: false`) or scans all four authority
# tables and writes a snapshot row to the new
# `governanceGraphSnapshotsTable` (TTL-managed).
#
# `captureMode` Wave 4.E.A allowlist is ONLY `'daily'`. The values
# `'on-change'` and `'both'` are reserved for Wave 4.E.A.2 (which
# would require DDB streams on the source tables) and the resolver
# rejects them with a forward-compat error.

type AuthorityGraphHistorySettings {
  enabled: Boolean!
  retentionDays: Int!
  captureMode: String!
  lastSnapshotAt: String
  snapshotCountInWindow: Int!
  storageEstimate: String
}

input UpdateAuthorityGraphHistorySettingsInput {
  enabled: Boolean!
  retentionDays: Int!
  captureMode: String!
  acknowledgement: String!
  reason: String
}

type AuthorityGraphHistorySettingsResult {
  ok: Boolean!
  settings: AuthorityGraphHistorySettings!
  emittedEventDetailType: String
}
# Governance UI — Wave 4.E.B (history scrubber)
#
# Read-only listing + per-snapshot fetch backing the time scrubber on the
# governance Graph page. Snapshots themselves are produced by the Wave
# 4.E.A scheduled writer (governance-graph-snapshot Lambda); this wave
# adds the projection so admin operators can replay the authority graph
# as it was at any captured snapshot.
#
# Both queries are admin-only via the resolver dispatch (defence in depth
# on top of AppSync auth). The graph rendering only uses authorityUnits +
# compositionContracts + agents, so the per-snapshot query intentionally
# omits constitutional layers + case law for size optimisation.

type AuthorityGraphSnapshotSummary {
  snapshotId: String!
  timestamp: Float!
  expiresAt: Float!
  kind: String!
  partial: Boolean!
  authorityUnitsCount: Int!
  compositionContractsCount: Int!
  constitutionalLayersCount: Int!
  caseLawCount: Int!
}

type AuthorityGraphSnapshot {
  snapshotId: String!
  timestamp: Float!
  expiresAt: Float!
  kind: String!
  partial: Boolean!
  authorityUnits: [AuthorityUnit!]!
  compositionContracts: [CompositionContract!]!
}
# Governance UI — Wave 5.A (D4 retrospective)
#
# Admin-only D4 defense-in-depth retrospective. Compares denial sets at the
# `worker-pre-filter` and `worker-tool-handler` engine scopes over a
# configurable window (allowlist: 7, 14, 30, 60, 90 days; default 30) and
# returns counts + an overlap-ratio-driven recommendation. Mirrors
# `arbiter/governance/d4_retrospective.py` verbatim — thresholds and the
# insufficient-evidence cut-off MUST match the Python script.

type D4RetrospectiveCounts {
  preFilterTotal: Int!
  toolHandlerTotal: Int!
  distinctPreFilter: Int!
  distinctToolHandler: Int!
  overlap: Int!
}

type D4RetrospectiveReport {
  generatedAt: Float!
  windowStart: Float!
  windowEnd: Float!
  windowDays: Int!
  insufficientEvidence: Boolean!
  counts: D4RetrospectiveCounts!
  overlapRatio: Float!
  recommendation: String!     # 'keep-both' | 'keep-both-strong-evidence' | 're-debate' | 'deferred-90d'
  truncated: Boolean!
}
# Governance UI — Wave 5.C.1 (IAM trust path)
#
# Admin-only audit of the IAM assume chain that an admin Lambda follows
# to reach a target resource (datastore / integration / agent). Wave 5.C.1
# computes the chain AS IF the governance-ui-resolver Lambda were the
# assumer — real call sites (datastore / integration / agent resolvers)
# follow the same pattern but the operator-pickable assumer ships in a
# future slice. Drift detection + simulate-principal-policy
# effective-permissions overlay are reserved for Wave 5.C.2.

type TrustPathPolicyStatement {
  effect: String!
  actions: [String!]!
  resources: [String!]!
  conditionsJson: String
}

type TrustPathRole {
  arn: String!
  name: String!
  scope: String!                   # 'lambda' | 'cross-account' | 'datastore' | 'integration' | 'agent'
  trustPolicyPrincipals: [String!]!
  inlinePolicy: [TrustPathPolicyStatement!]!
  inlinePolicyName: String
  totalActions: Int!
  totalResources: Int!
}

type TrustPathReport {
  resourceType: String!            # 'agent' | 'datastore' | 'integration'
  resourceId: String!
  generatedAt: Float!
  hops: [TrustPathRole!]!          # ordered Lambda → cross-account? → scoped
  notes: [String!]!                # operational notes (e.g. cross-account role unconfigured)
}
# Governance UI — Wave 5.C.2 (IAM drift detector)

type IamDriftActionGroup {
  resourceArnPattern: String!
  declaredActions: [String!]!
  effectiveActions: [String!]!
  excessActions: [String!]!
  missingActions: [String!]!
}

type IamDriftReport {
  resourceType: String!
  resourceId: String!
  scopedRoleArn: String!
  generatedAt: Float!
  hasDrift: Boolean!
  totalExcess: Int!
  totalMissing: Int!
  groups: [IamDriftActionGroup!]!
  notes: [String!]!
}