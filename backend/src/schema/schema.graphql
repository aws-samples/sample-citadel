# ADR governance entity.
# See enum ADRStatus / ADRSeverity for lifecycle and severity domains.
# The five mandatory framework fields (decision, reasoning, constraints,
# alternativesConsidered, revisitConditions) implement the canonical
# Architecture Decision Record pattern. QT1-6 adds severity/affectsModules/
# reviewers as optional metadata. QT3-2 guarantees optimistic-lock writes
# via the version field. sourceRoundIds carries the conversation rounds
# that produced the decision (C7/C14 traceability).
type ADR {
  adrId: ID!
  projectId: ID!
  title: String!
  decision: String!
  reasoning: String!
  constraints: [String!]!
  alternativesConsidered: [String!]!
  revisitConditions: [String!]!
  status: ADRStatus!
  severity: ADRSeverity
  affectsModules: [String!]
  reviewers: [String!]
  version: Int!
  createdAt: AWSDateTime!
  createdBy: String!
  lockedAt: AWSDateTime
  supersededBy: ID
  sourceRoundIds: [ID!]!
}

input ADRInput {
  projectId: ID!
  title: String!
  decision: String!
  reasoning: String!
  constraints: [String!]!
  alternativesConsidered: [String!]!
  revisitConditions: [String!]!
  severity: ADRSeverity
  affectsModules: [String!]
  reviewers: [String!]
  sourceRoundIds: [ID!]!
}

