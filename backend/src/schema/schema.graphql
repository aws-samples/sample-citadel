  revokeAppAccess(appId: ID!, userId: String!): RegistryAgentRecord
  startExecution(workflowId: ID!, input: AWSJSON): Execution
  cancelExecution(executionId: ID!): Execution
  publishWorkflowProgress(input: WorkflowProgressInput!): WorkflowProgressEvent @aws_iam

  # AgentDesignAssessment (Requirement 7)
  startAgentDesignAssessment(projectId: ID!): AgentDesignAssessment!
  submitAgentDesignAssessment(
    projectId: ID!
    archetype: GovernanceArchetype!
    archetypeConfidence: Float
    dimensionRanking: [DimensionComplexityInput!]!
    accessibleDataSources: [String!]!
    primaryRiskAreas: [String!]!
  ): AgentDesignAssessment!
  # ProgramReview (Requirement 10)
  runProgramReview(projectId: ID!): ProgramReview!
  # ExecutionSpecification
  createExecutionSpecification(input: ExecutionSpecificationInput!): ExecutionSpecification!
  submitExecutionSpecification(specId: ID!): ExecutionSpecification!
  approveExecutionSpecification(specId: ID!): ExecutionSpecification!
  rejectExecutionSpecification(specId: ID!, reason: String!): ExecutionSpecification!
  reviseExecutionSpecification(specId: ID!, input: ReviseExecutionSpecificationInput!): ExecutionSpecification!
  # InterrogationRound
  startInterrogationRound(projectId: ID!, roundN: Int!): InterrogationRound!
  injectConstraints(projectId: ID!, roundN: Int!, constraints: [String!]!): InterrogationRound!
  stabiliseRound(projectId: ID!, roundN: Int!, transcript: [TranscriptMessageInput!]!, stabilisedSummary: String!): InterrogationRound!

  setGovernanceMode(input: SetGovernanceModeInput!): SetGovernanceModeResult!

  markReadinessCheckVerified(input: MarkReadinessCheckVerifiedInput!): MarkReadinessCheckVerifiedResult!

  # Internal-only: published by the governance fanout Lambda via an
  # IAM-signed request. MUST NOT be exposed to user-pool clients —
  # the auth check at the resolver level rejects non-IAM callers as a
  # defence-in-depth measure on top of the directive.
  publishGovernanceFinding(input: PublishGovernanceFindingInput!): GovernanceFinding!
    @aws_iam

  # Internal-only: published by the governance-notifier relay Lambda
  # (driven by EventBridge governance.* detail-types). Carries the full
  # original event payload (detail) as AWSJSON so admin subscribers see
  # the same shape the producer wrote, plus a contract version so future
  # additions to the GovernanceEvent payload are non-breaking.
  publishGovernanceEvent(input: GovernanceEventInput!): GovernanceEvent!
    @aws_iam

  addConstitutionalRule(input: AddConstitutionalRuleInput!): ConstitutionalRuleMutationResult!
  updateConstitutionalRule(input: UpdateConstitutionalRuleInput!): ConstitutionalRuleMutationResult!
  deleteConstitutionalRule(input: DeleteConstitutionalRuleInput!): ConstitutionalRuleMutationResult!

  revokeCaseLaw(input: RevokeCaseLawInput!): CaseLawMutationResult!
  unrevokeCaseLaw(input: UnrevokeCaseLawInput!): CaseLawMutationResult!
  updateCaseLawPrecedence(input: UpdateCaseLawPrecedenceInput!): CaseLawMutationResult!

  updateAuthorityGraphHistorySettings(input: UpdateAuthorityGraphHistorySettingsInput!): AuthorityGraphHistorySettingsResult!
}

type Subscription {
  onAgentStatusUpdate(projectId: ID!): AgentStatus
    @aws_subscribe(mutations: ["updateAgentStatus"])
  onConversationMessage(projectId: ID!): ConversationMessage
    @aws_subscribe(mutations: ["sendMessage", "publishConversationMessage"])
  onProjectProgress(projectId: ID!): ProjectProgress
    @aws_subscribe(mutations: ["updateProjectProgress"])
  onAssessmentCompleted(projectId: ID!): AssessmentCompletionEvent
    @aws_subscribe(mutations: ["publishAssessmentCompletion"])
  onDesignProgress(projectId: ID!): DesignProgressEvent
    @aws_subscribe(mutations: ["publishDesignProgress"])
    @aws_iam @aws_cognito_user_pools
  onChatter: AgentChatterMessage
    @aws_subscribe(mutations: ["publishChatter"])
    @aws_cognito_user_pools
  onFabricationEvent: FabricationEvent
    @aws_subscribe(mutations: ["publishFabricationEvent"])
    @aws_iam @aws_cognito_user_pools
  onWorkflowProgress(executionId: ID!): WorkflowProgressEvent
    @aws_subscribe(mutations: ["publishWorkflowProgress"])
    @aws_iam @aws_cognito_user_pools
  onAppStatusChange(appId: ID!): AppStatusEvent
    @aws_subscribe(mutations: ["publishAppStatusEvent"])
    @aws_iam @aws_cognito_user_pools

  # Live stream of governance findings as they are recorded. Admin-only
  # via the Cognito group filter on the directive — non-admin tokens are
  # rejected by AppSync at CONNECT time, the resolver layer never runs.
  onGovernanceFinding(decision: String): GovernanceFinding
    @aws_subscribe(mutations: ["publishGovernanceFinding"])
    @aws_cognito_user_pools(cognito_groups: ["admin"])

  # Live stream of governance.* EventBridge events relayed via the
  # governance-notifier Lambda. Admin-only — the directive rejects
  # non-admin tokens at CONNECT time. Optional `detailType` filter
  # surfaces a single channel of the 14 governance.* detail-types when
  # callers don't want the firehose.
  onGovernanceEvent(detailType: String): GovernanceEvent
    @aws_subscribe(mutations: ["publishGovernanceEvent"])
    @aws_cognito_user_pools(cognito_groups: ["admin"])
}

